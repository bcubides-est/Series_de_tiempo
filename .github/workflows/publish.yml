name: Publish Quarto Book

on:
  push:
    branches: [ main ]

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Git LFS
        run: |
          # Descargar e instalar Git LFS manualmente
          curl -s https://packagecloud.io/install/repositories/github/git-lfs/config_file.list?os=Ubuntu&dist=noble&source=script | tee /etc/apt/sources.list.d/github_git-lfs.list
          curl -s https://packagecloud.io/github/git-lfs/gpgkey | gpg --dearmor > /etc/apt/keyrings/github_git-lfs-archive-keyring.gpg
          apt-get update && apt-get install -y git-lfs

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.4.2'

      - name: Setup Quarto
        uses: quarto-dev/quarto-actions/setup@v2
        with:
          version: '1.7.33'

      - name: Install renv packages
        uses: r-lib/actions/setup-renv@v2

      - name: Render Book
        run: quarto render

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: _book